name: workipedia-qdrant

services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    ports:
      - "0.0.0.0:${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      TZ: ${TZ:-Asia/Seoul}
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  qdrant-data:
    name: ${QDRANT_VOLUME_NAME:-workipedia-qdrant-data}
