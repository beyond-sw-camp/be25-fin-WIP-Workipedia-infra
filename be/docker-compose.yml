name: workipedia-be

services:
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - data

  elasticsearch:
    image: ${ELASTICSEARCH_IMAGE:-ghcr.io/beyond-sw-camp/be25-fin-wip-workipedia-be-elasticsearch:8.18.8}
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - data

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "0.0.0.0:${BACKEND_PORT:-8080}:8080"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}

      SPRING_DATASOURCE_URL: jdbc:mariadb://${MARIADB_HOST:?MARIADB_HOST is required}:${MARIADB_PORT:-3306}/${MARIADB_DATABASE:?MARIADB_DATABASE is required}
      SPRING_DATASOURCE_USERNAME: ${MARIADB_USER:?MARIADB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_JPA_DDL_AUTO: ${SPRING_JPA_DDL_AUTO:-validate}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-12h}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-14d}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}

      APP_MAIL_SENDER: ${APP_MAIL_SENDER:-}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}

      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}
      S3_UPLOAD_BUCKET: ${S3_UPLOAD_BUCKET:?S3_UPLOAD_BUCKET is required}
      AWS_REGION: ${AWS_REGION:?AWS_REGION is required}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:?AWS_ACCESS_KEY is required}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:?AWS_SECRET_KEY is required}

      # 인프라 ESG 대시보드: CloudWatch CPU 조회 대상 리소스 (AWS 자격증명은 위 S3용을 재사용)
      # AI는 ASG로 운영하므로 instance-id 대신 INFRA_ESG_AI_ASG_NAME(그룹 집계)을 전달한다.
      INFRA_ESG_BE_INSTANCE_ID: ${INFRA_ESG_BE_INSTANCE_ID:?INFRA_ESG_BE_INSTANCE_ID is required}
      INFRA_ESG_AI_ASG_NAME: ${INFRA_ESG_AI_ASG_NAME:?INFRA_ESG_AI_ASG_NAME is required}
      INFRA_ESG_QDRANT_INSTANCE_ID: ${INFRA_ESG_QDRANT_INSTANCE_ID:?INFRA_ESG_QDRANT_INSTANCE_ID is required}
      INFRA_ESG_RDS_INSTANCE_ID: ${INFRA_ESG_RDS_INSTANCE_ID:?INFRA_ESG_RDS_INSTANCE_ID is required}

      AI_BASE_URL: ${AI_BASE_URL:?AI_BASE_URL is required}
      AI_TIMEOUT_ROUTING_MS: ${AI_TIMEOUT_ROUTING_MS:-5000}
      AI_TIMEOUT_CHATBOT_MS: ${AI_TIMEOUT_CHATBOT_MS:-30000}
      AI_TIMEOUT_SYNC_MS: ${AI_TIMEOUT_SYNC_MS:-30000}
      AI_SYNC_WORKER_DOCUMENT_CRON: ${AI_SYNC_WORKER_DOCUMENT_CRON:-0 0 * * * *}
      AI_SYNC_WORKER_TEXT_CRON: ${AI_SYNC_WORKER_TEXT_CRON:-0 0 * * * *}

      TOOL_ALLOWED_HOSTS: ${TOOL_ALLOWED_HOSTS:-}
      TOOL_DB_ALLOWED_DATASOURCES: ${TOOL_DB_ALLOWED_DATASOURCES:-}
      TOOL_DB_READONLY_URL: ${TOOL_DB_READONLY_URL:-}
      TOOL_DB_READONLY_USERNAME: ${TOOL_DB_READONLY_USERNAME:-}
      TOOL_DB_READONLY_PASSWORD: ${TOOL_DB_READONLY_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s
    networks:
      - app
      - data

networks:
  app:
    name: workipedia-be-app
  data:
    name: workipedia-be-data
    internal: true

volumes:
  redis-data:
    name: ${REDIS_VOLUME_NAME:-workipedia_redis-data}
  elasticsearch-data:
    name: ${ELASTICSEARCH_VOLUME_NAME:-workipedia_elasticsearch-data}
