name: workipedia-be

services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-workipedia}
      MARIADB_USER: ${MARIADB_USER:-wip}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD is required}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - data

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.8
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - data

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      SPRING_PROFILES_ACTIVE: local

      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${MARIADB_DATABASE:-workipedia}
      SPRING_DATASOURCE_USERNAME: ${MARIADB_USER:-wip}
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_JPA_DDL_AUTO: validate

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-12h}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-14d}

      APP_MAIL_SENDER: ${APP_MAIL_SENDER:-}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}

      STORAGE_PROVIDER: ${STORAGE_PROVIDER:?STORAGE_PROVIDER is required}
      STORAGE_BUCKET: ${STORAGE_BUCKET:?STORAGE_BUCKET is required}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:?STORAGE_PUBLIC_BASE_URL is required}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-unused}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-unused}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-unused}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-unused}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-unused}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://localhost}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-unused}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-unused}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}

      AI_BASE_URL: ${AI_BASE_URL:?AI_BASE_URL is required}
      AI_TIMEOUT_ROUTING_MS: ${AI_TIMEOUT_ROUTING_MS:-5000}
      AI_TIMEOUT_CHATBOT_MS: ${AI_TIMEOUT_CHATBOT_MS:-30000}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s
    networks:
      - app
      - data

networks:
  app:
    name: workipedia-be-app
  data:
    name: workipedia-be-data
    internal: true

volumes:
  mariadb-data:
    name: ${MARIADB_VOLUME_NAME:-workipedia_mariadb-data}
  redis-data:
    name: ${REDIS_VOLUME_NAME:-workipedia_redis-data}
  elasticsearch-data:
    name: ${ELASTICSEARCH_VOLUME_NAME:-workipedia_elasticsearch-data}
