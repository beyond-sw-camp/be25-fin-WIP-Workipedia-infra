name: Infra Validate

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  compose:
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE: example.invalid/workipedia-be:test
      AI_IMAGE: example.invalid/workipedia-ai:test
      MARIADB_ROOT_PASSWORD: compose-validation
      MARIADB_PASSWORD: compose-validation
      REDIS_PASSWORD: compose-validation
      JWT_SECRET: compose-validation-secret
      STORAGE_PROVIDER: s3
      STORAGE_BUCKET: compose-validation
      STORAGE_PUBLIC_BASE_URL: https://example.invalid
      AI_BASE_URL: https://ai.example.invalid
      LLM_PROVIDER: openai
      EMBEDDING_PROVIDER: openai
    strategy:
      matrix:
        target:
          - be
          - ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        working-directory: ${{ matrix.target }}
        run: docker compose config --quiet
