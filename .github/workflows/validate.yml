name: Infra Validate

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  compose:
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE: example.invalid/workipedia-be:test
      AI_IMAGE: example.invalid/workipedia-ai:test
      DB_HOST: db.example.invalid
      DB_PORT: 3306
      DB_NAME: workipedia
      DB_USERNAME: workipedia
      DB_PASSWORD: compose-validation
      REDIS_PASSWORD: compose-validation
      JWT_SECRET: compose-validation-secret
      INTERNAL_API_KEY: compose-validation
      AWS_ACCESS_KEY_ID: compose-validation
      AWS_SECRET_ACCESS_KEY: compose-validation
      AWS_REGION: ap-northeast-2
      S3_UPLOAD_BUCKET: compose-validation-upload
      AI_BASE_URL: http://ai.example.invalid:8000
      LLM_PROVIDER: openai
      EMBEDDING_PROVIDER: ollama
      CHAT_MODEL: llama3.1:8b
      EMBEDDING_MODEL: bge-m3
      QDRANT_HOST: qdrant.example.invalid
      QDRANT_PORT: 6333
      BE_BASE_URL: http://be.example.invalid:8080
    strategy:
      matrix:
        target:
          - be
          - ai
          - qdrant
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        working-directory: ${{ matrix.target }}
        run: docker compose config --quiet
