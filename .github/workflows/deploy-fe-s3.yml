name: Deploy Frontend to S3

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Frontend git ref to deploy
        required: false
        default: main
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-fe-s3.yml

permissions:
  contents: read

concurrency:
  group: frontend-s3-production-deploy
  cancel-in-progress: true

env:
  FRONTEND_REPOSITORY: beyond-sw-camp/be25-fin-WIP-Workipedia-fe
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    name: Build Vue and Upload to S3
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          ref: ${{ github.event.inputs.ref || 'main' }}
          path: frontend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload dist to S3
        run: aws s3 sync frontend/dist "s3://${{ secrets.S3_FE_BUCKET }}/" --delete

      - name: Invalidate CloudFront
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
